<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EML Finance – Acceso</title>
  <style>
    :root {
      --bg: #0f1117; --bg2: #1a1d27; --bg3: #22263a;
      --border: #2e3248; --text: #e2e8f0; --muted: #64748b;
      --accent: #6366f1;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 40px 36px;
      width: 360px;
    }
    h1 { font-size: 22px; font-weight: 700; letter-spacing: -.02em; margin-bottom: 4px; }
    p.sub { font-size: 12px; color: var(--muted); margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; font-family: monospace; letter-spacing: .06em; text-transform: uppercase; }
    input {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); border-radius: 7px; padding: 9px 12px;
      font-size: 14px; font-family: inherit;
    }
    input:focus { outline: none; border-color: var(--accent); }
    button {
      width: 100%; background: var(--accent); color: #fff;
      border: none; border-radius: 7px; padding: 10px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      margin-top: 8px; font-family: inherit;
    }
    button:hover { opacity: .88; }
    .error {
      background: rgba(239,68,68,.12); color: #f87171;
      border: 1px solid rgba(239,68,68,.25);
      border-radius: 7px; padding: 10px 14px;
      font-size: 13px; margin-bottom: 18px;
    }
    .brand { color: var(--accent); }
  </style>
</head>
<body>
  <div class="login-box">
    <h1><span class="brand">EML</span> Finance</h1>
    <p class="sub">Cartera personal de inversiones</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
      <div class="error">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" name="username" autocomplete="username" autofocus required>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit">Ingresar</button>
    </form>
  </div>
</body>
</html>
