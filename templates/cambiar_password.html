{% extends "base.html" %}
{% block title %}Mi contraseña – EML Finance{% endblock %}

{% block content %}
<h1 class="page-title">Cambiar contraseña</h1>

<div class="card" style="max-width:420px;">
  {% if error %}
  <div class="flash error" style="margin-bottom:16px;">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <div style="margin-bottom:14px;">
      <label class="form-label">Contraseña actual</label>
      <input type="password" class="form-control" name="actual" required>
    </div>
    <div style="margin-bottom:14px;">
      <label class="form-label">Nueva contraseña</label>
      <input type="password" class="form-control" name="nueva" minlength="6" required>
    </div>
    <div style="margin-bottom:20px;">
      <label class="form-label">Confirmar nueva contraseña</label>
      <input type="password" class="form-control" name="confirma" minlength="6" required>
    </div>
    <button type="submit" class="btn btn-primary">Actualizar contraseña</button>
  </form>
</div>
{% endblock %}
